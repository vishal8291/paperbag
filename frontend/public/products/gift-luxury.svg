<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6f0"/>
      <stop offset="100%" style="stop-color:#f5e6d8"/>
    </linearGradient>
    <linearGradient id="bagG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="40%" style="stop-color:#3d2460"/>
      <stop offset="100%" style="stop-color:#1a0f30"/>
    </linearGradient>
    <linearGradient id="sideG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#150c25"/>
      <stop offset="100%" style="stop-color:#3d2460"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="ribbonV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh">
      <feDropShadow dx="4" dy="10" stdDeviation="10" flood-color="#00000035"/>
    </filter>
  </defs>

  <rect width="400" height="450" fill="url(#bgG)" rx="20"/>

  <!-- Stars decoration -->
  <text x="45" y="65" font-size="14" fill="#c9a84c" opacity="0.4">✦</text>
  <text x="340" y="65" font-size="10" fill="#c9a84c" opacity="0.3">✦</text>
  <text x="355" y="390" font-size="8" fill="#c9a84c" opacity="0.3">✦</text>
  <text x="30" y="390" font-size="12" fill="#c9a84c" opacity="0.3">✦</text>

  <!-- Bag body -->
  <g filter="url(#sh)">
    <polygon points="75,105 115,95 115,375 75,385" fill="url(#sideG)"/>
    <rect x="115" y="95" width="195" height="280" fill="url(#bagG)"/>
    <polygon points="310,95 350,105 350,385 310,375" fill="#1a0f30"/>
    <polygon points="75,385 115,375 310,375 350,385 310,400 115,400" fill="#0f0820"/>
  </g>

  <!-- Gold top band -->
  <rect x="115" y="95" width="195" height="18" fill="url(#goldG)"/>
  <rect x="115" y="113" width="195" height="2" fill="#c9a84c" opacity="0.5"/>

  <!-- Gold side lines -->
  <line x1="115" y1="95" x2="115" y2="375" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="95" x2="310" y2="375" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>

  <!-- Vertical ribbon -->
  <rect x="195" y="113" width="10" height="262" fill="url(#ribbonV)" opacity="0.9"/>

  <!-- Horizontal ribbon -->
  <rect x="115" y="225" width="195" height="10" fill="url(#goldG)" opacity="0.9"/>

  <!-- Bow knot circle -->
  <circle cx="200" cy="230" r="14" fill="#2d1b4e" stroke="url(#goldG)" stroke-width="2"/>
  <circle cx="200" cy="230" r="8" fill="url(#goldG)"/>
  <circle cx="200" cy="230" r="4" fill="#2d1b4e"/>

  <!-- Bow loops -->
  <path d="M186,220 Q170,205 175,218 Q178,225 186,222" fill="url(#goldG)"/>
  <path d="M214,220 Q230,205 225,218 Q222,225 214,222" fill="url(#goldG)"/>
  <path d="M186,240 Q170,255 175,242 Q178,235 186,238" fill="#c9a84c"/>
  <path d="M214,240 Q230,255 225,242 Q222,235 214,238" fill="#c9a84c"/>

  <!-- Bow tails -->
  <path d="M197,244 Q188,265 182,270" stroke="url(#goldG)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M203,244 Q212,265 218,270" stroke="url(#goldG)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Subtle shimmer lines on bag -->
  <line x1="125" y1="140" x2="310" y2="140" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>
  <line x1="125" y1="310" x2="310" y2="310" stroke="#c9a84c" stroke-width="0.3" opacity="0.2"/>

  <!-- Cord handles -->
  <path d="M155,96 Q150,50 200,50 Q250,50 245,96" fill="none" stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>

  <!-- Small logo -->
  <text x="200" y="170" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c9a84c" opacity="0.7" letter-spacing="4">PAPERBAG</text>
  <line x1="148" y1="175" x2="170" y2="175" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
  <line x1="230" y1="175" x2="252" y2="175" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

  <rect x="0" y="420" width="400" height="30" fill="#2d1b4e" opacity="0.06" rx="0 0 20 20"/>
  <text x="200" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2d1b4e" font-weight="700" letter-spacing="4" opacity="0.6">LUXURY GIFT BAG</text>
</svg>
