<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a96e"/>
      <stop offset="50%" style="stop-color:#b8925a"/>
      <stop offset="100%" style="stop-color:#9a7540"/>
    </linearGradient>
    <linearGradient id="bagSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8a6530"/>
      <stop offset="100%" style="stop-color:#c8a96e"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b87e"/>
      <stop offset="100%" style="stop-color:#b8925a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="450" fill="url(#bg)" rx="20"/>

  <!-- Subtle texture dots -->
  <circle cx="40" cy="40" r="2" fill="#c8a96e" opacity="0.3"/>
  <circle cx="360" cy="40" r="2" fill="#c8a96e" opacity="0.3"/>
  <circle cx="40" cy="410" r="2" fill="#c8a96e" opacity="0.3"/>
  <circle cx="360" cy="410" r="2" fill="#c8a96e" opacity="0.3"/>

  <!-- Bag body with shadow -->
  <g filter="url(#shadow)">
    <!-- Left side panel -->
    <polygon points="80,100 120,90 120,370 80,380" fill="url(#bagSide)"/>
    <!-- Main front face -->
    <rect x="120" y="90" width="200" height="280" fill="url(#bagGrad)" rx="2"/>
    <!-- Right side panel -->
    <polygon points="320,90 360,100 360,380 320,370" fill="#a07845"/>
    <!-- Bottom -->
    <polygon points="80,380 120,370 320,370 360,380 320,395 120,395" fill="#8a6530"/>
  </g>

  <!-- Top fold -->
  <rect x="120" y="90" width="200" height="22" fill="url(#fold)" rx="2"/>
  <line x1="120" y1="112" x2="320" y2="112" stroke="#9a7540" stroke-width="1" opacity="0.5"/>

  <!-- Paper texture lines on front -->
  <line x1="130" y1="130" x2="310" y2="130" stroke="#a07845" stroke-width="0.5" opacity="0.4"/>
  <line x1="130" y1="160" x2="310" y2="160" stroke="#a07845" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="190" x2="310" y2="190" stroke="#a07845" stroke-width="0.5" opacity="0.2"/>

  <!-- Rope handles -->
  <path d="M160,90 Q160,45 200,45 Q240,45 240,90" fill="none" stroke="#6b4c2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Handle shadow on bag -->
  <ellipse cx="165" cy="92" rx="6" ry="3" fill="#8a6530" opacity="0.4"/>
  <ellipse cx="235" cy="92" rx="6" ry="3" fill="#8a6530" opacity="0.4"/>

  <!-- Eco badge -->
  <circle cx="200" cy="240" r="42" fill="none" stroke="#6b4c2a" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="240" r="36" fill="#c8a96e" opacity="0.3"/>
  <text x="200" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#5a3a1a" font-weight="bold" letter-spacing="2">100%</text>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#5a3a1a">RECYCLED</text>
  <text x="200" y="260" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#5a3a1a">PAPER</text>

  <!-- Leaf decoration -->
  <g transform="translate(200,195) scale(0.7)" opacity="0.6">
    <ellipse cx="0" cy="-12" rx="6" ry="10" fill="#6b8c42" transform="rotate(-20)"/>
    <ellipse cx="0" cy="-12" rx="6" ry="10" fill="#5a7835" transform="rotate(20)"/>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#4a6828" stroke-width="1.5"/>
  </g>

  <!-- Bottom label strip -->
  <rect x="0" y="415" width="400" height="35" fill="#b8925a" opacity="0.15" rx="0 0 20 20"/>
  <text x="200" y="437" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#5a3a1a" font-weight="600" letter-spacing="3">KRAFT CLASSIC</text>
</svg>
