<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <linearGradient id="bagB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="sideB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#252525"/>
    </linearGradient>
    <linearGradient id="whiteG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8c8c8"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8c8c8"/>
    </linearGradient>
    <linearGradient id="shineB" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" style="stop-color:#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shB">
      <feDropShadow dx="5" dy="10" stdDeviation="12" flood-color="#00000040"/>
    </filter>
  </defs>

  <rect width="400" height="450" fill="url(#bgB)" rx="20"/>

  <!-- Grid pattern bg -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="450" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Bag -->
  <g filter="url(#shB)">
    <polygon points="78,102 115,92 115,372 78,382" fill="url(#sideB)"/>
    <rect x="115" y="92" width="196" height="280" fill="url(#bagB)"/>
    <!-- Shine overlay -->
    <rect x="115" y="92" width="196" height="280" fill="url(#shineB)"/>
    <polygon points="311,92 348,102 348,382 311,372" fill="#0d0d0d"/>
    <polygon points="78,382 115,372 311,372 348,382 311,396 115,396" fill="#050505"/>
  </g>

  <!-- White top band -->
  <rect x="115" y="92" width="196" height="14" fill="url(#whiteG)"/>

  <!-- Glossy highlight on bag edge -->
  <rect x="115" y="106" width="3" height="266" fill="white" opacity="0.04"/>

  <!-- White logo area – embossed feel -->
  <rect x="148" y="180" width="104" height="90" rx="4" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>

  <!-- Geometric logo mark -->
  <g transform="translate(200, 215)" opacity="0.9">
    <!-- Diamond shape -->
    <polygon points="0,-22 16,0 0,22 -16,0" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Inner diamond -->
    <polygon points="0,-12 8,0 0,12 -8,0" fill="white" opacity="0.15"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="300" letter-spacing="6" opacity="0.9">PAPERBAG</text>
  <line x1="155" y1="256" x2="245" y2="256" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="267" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="white" letter-spacing="4" opacity="0.5">BOUTIQUE SERIES</text>

  <!-- Black satin ribbon handles -->
  <path d="M158,92 Q155,46 200,46 Q245,46 242,92" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
  <!-- Handle sheen -->
  <path d="M160,92 Q157,50 200,50 Q243,50 240,92" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Handle attachment -->
  <rect x="152" y="90" width="14" height="8" rx="2" fill="#0d0d0d"/>
  <rect x="234" y="90" width="14" height="8" rx="2" fill="#0d0d0d"/>

  <!-- Tissue paper peek -->
  <path d="M118,92 Q140,78 165,88 Q185,75 200,86 Q220,73 240,86 Q262,76 308,92" fill="none" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>

  <rect x="0" y="420" width="400" height="30" fill="#1a1a1a" opacity="0.06" rx="0 0 20 20"/>
  <text x="200" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a1a" font-weight="700" letter-spacing="4" opacity="0.6">BOUTIQUE BLACK</text>
</svg>
