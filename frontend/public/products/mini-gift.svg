<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffef5"/>
      <stop offset="100%" style="stop-color:#fff8e0"/>
    </linearGradient>
    <linearGradient id="bag1M" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e0a820"/>
    </linearGradient>
    <linearGradient id="bag2M" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d8a"/>
      <stop offset="100%" style="stop-color:#c83860"/>
    </linearGradient>
    <linearGradient id="bag3M" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba8e0"/>
      <stop offset="100%" style="stop-color:#3880c0"/>
    </linearGradient>
    <filter id="shM">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="400" height="450" fill="url(#bgM)" rx="20"/>

  <!-- Confetti dots -->
  <circle cx="50" cy="60" r="5" fill="#f5c842" opacity="0.5"/>
  <circle cx="80" cy="40" r="3" fill="#e85d8a" opacity="0.4"/>
  <circle cx="340" cy="55" r="4" fill="#5ba8e0" opacity="0.5"/>
  <circle cx="365" cy="80" r="3" fill="#f5c842" opacity="0.4"/>
  <circle cx="45" cy="390" r="4" fill="#5ba8e0" opacity="0.4"/>
  <circle cx="360" cy="395" r="5" fill="#e85d8a" opacity="0.4"/>
  <rect x="355" y="40" width="6" height="6" rx="1" fill="#e85d8a" opacity="0.4" transform="rotate(30 358 43)"/>
  <rect x="38" y="400" width="5" height="5" rx="1" fill="#f5c842" opacity="0.4" transform="rotate(20 40 402)"/>

  <!-- === BAG 1 (Yellow) — back left === -->
  <g filter="url(#shM)" transform="translate(-20, 30)">
    <polygon points="98,112 126,105 126,345 98,352" fill="#c88a10" opacity="0.9"/>
    <rect x="126" y="105" width="110" height="240" fill="url(#bag1M)"/>
    <polygon points="236,105 265,112 265,352 236,345" fill="#c88010"/>
    <rect x="126" y="105" width="110" height="18" fill="#e0a820"/>
    <!-- Polka dot pattern -->
    <circle cx="155" cy="180" r="6" fill="white" opacity="0.25"/>
    <circle cx="185" cy="200" r="5" fill="white" opacity="0.2"/>
    <circle cx="215" cy="175" r="7" fill="white" opacity="0.25"/>
    <circle cx="148" cy="225" r="4" fill="white" opacity="0.2"/>
    <circle cx="225" cy="230" r="5" fill="white" opacity="0.2"/>
    <circle cx="175" cy="260" r="6" fill="white" opacity="0.25"/>
    <!-- Simple bow -->
    <path d="M165,105 Q162,75 181,78 Q185,91 175,105" fill="none" stroke="#8a5c00" stroke-width="3"/>
    <path d="M196,105 Q198,75 180,78 Q176,91 186,105" fill="none" stroke="#8a5c00" stroke-width="3"/>
    <circle cx="181" cy="79" r="5" fill="#8a5c00"/>
  </g>

  <!-- === BAG 3 (Blue) — back right === -->
  <g filter="url(#shM)" transform="translate(30, 20)">
    <polygon points="188,118 212,112 212,348 188,355" fill="#2a60a8" opacity="0.9"/>
    <rect x="212" y="112" width="105" height="236" fill="url(#bag3M)"/>
    <polygon points="317,112 342,118 342,355 317,348" fill="#2858a0"/>
    <rect x="212" y="112" width="105" height="16" fill="#3880c0"/>
    <!-- Star pattern -->
    <text x="255" y="200" text-anchor="middle" font-size="22" fill="white" opacity="0.25">★</text>
    <text x="240" y="240" text-anchor="middle" font-size="14" fill="white" opacity="0.2">★</text>
    <text x="275" y="255" text-anchor="middle" font-size="16" fill="white" opacity="0.22">★</text>
    <text x="248" y="285" text-anchor="middle" font-size="12" fill="white" opacity="0.2">★</text>
    <!-- Curled ribbon handle -->
    <path d="M238,112 Q235,78 264,78 Q290,78 287,112" fill="none" stroke="#1a4888" stroke-width="3"/>
    <circle cx="238" cy="112" r="4" fill="#1a4888"/>
    <circle cx="287" cy="112" r="4" fill="#1a4888"/>
  </g>

  <!-- === BAG 2 (Pink) — front center === -->
  <g filter="url(#shM)" transform="translate(10, 0)">
    <polygon points="110,108 148,98 148,370 110,380" fill="#a02850"/>
    <rect x="148" y="98" width="138" height="272" fill="url(#bag2M)"/>
    <polygon points="286,98 325,108 325,380 286,370" fill="#a02040"/>
    <polygon points="110,380 148,370 286,370 325,380 286,392 148,392" fill="#880018"/>
    <!-- Top fold -->
    <rect x="148" y="98" width="138" height="18" fill="#c83060"/>
    <!-- Heart pattern -->
    <g fill="white" opacity="0.22">
      <path d="M178,175 C178,170 184,166 188,170 C192,166 198,170 198,175 C198,182 188,190 188,190 C188,190 178,182 178,175 Z"/>
      <path d="M215,200 C215,196 220,193 223,196 C226,193 231,196 231,200 C231,206 223,213 223,213 C223,213 215,206 215,200 Z"/>
      <path d="M160,215 C160,212 164,209 167,212 C170,209 174,212 174,215 C174,220 167,226 167,226 C167,226 160,220 160,215 Z"/>
      <path d="M225,150 C225,147 229,145 231,147 C234,145 237,147 237,150 C237,155 231,160 231,160 C231,160 225,155 225,150 Z"/>
    </g>
    <!-- Brand name -->
    <text x="217" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="600" letter-spacing="2" opacity="0.6">PAPERBAG</text>
    <!-- Curly rope handle -->
    <path d="M172,98 Q168,52 217,52 Q266,52 262,98" fill="none" stroke="#880018" stroke-width="5" stroke-linecap="round"/>
    <path d="M173,98 Q169,55 217,55 Q265,55 261,98" fill="none" stroke="#f5a0b8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <rect x="0" y="420" width="400" height="30" fill="#e85d8a" opacity="0.08" rx="0 0 20 20"/>
  <text x="200" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8a2040" font-weight="700" letter-spacing="3" opacity="0.7">MINI GIFT BAGS (SET)</text>
</svg>
